[program:converter]
command=%(ENV_EO_ROOT)s/server/FileConverter/converter
directory=%(ENV_EO_ROOT)s/server/FileConverter
user=ds
environment=HOME=/home/ds,NODE_ENV=production-linux,NODE_CONFIG_DIR=%(ENV_EO_CONF)s,NODE_DISABLE_COLORS=1,APPLICATION_NAME=euro-office,LD_LIBRARY_PATH=%(ENV_EO_ROOT)s/server/FileConverter/bin:%(ENV_EO_ROOT)s/server/FileConverter/lib
stdout_logfile=%(ENV_EO_LOG)s/converter/out.log
stdout_logfile_backups=0
stdout_logfile_maxbytes=0
stderr_logfile=%(ENV_EO_LOG)s/converter/err.log
stderr_logfile_backups=0
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
